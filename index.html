<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบประเมินความพึงพอใจและออกใบประกาศนียบัตร</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel (เปลี่ยนเป็น CDN ที่เสถียรขึ้นเพื่อแก้ปัญหาหน้าขาว) -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

    <!-- Chart.js for Admin Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <!-- html2canvas and jsPDF for Certificate Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Sarabun', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            light: '#60a5fa',
                            DEFAULT: '#2563eb',
                            dark: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
        
        /* Custom Radio Button Styles */
        input[type="radio"] {
            width: 24px;
            height: 24px;
            accent-color: #2563eb;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const INITIAL_QUESTIONS = [
            "วิทยากรให้คำแนะนำ/ตอบข้อซักถามได้เป็นอย่างดี",
            "มีความกระตือรือร้นในการให้ความรู้",
            "สอนอย่างเป็นระบบและเป็นขั้นตอนเข้าใจง่าย",
            "สามารถนำความรู้ที่ได้ไปประยุกต์ใช้ในการทำงาน",
            "อุปกรณ์, เครื่องมือและสถานที่เหมาะสมในการฝึกอบรม",
            "ความพึงพอใจในการให้บริการโดยภาพรวมของศูนย์บริการทางวิชาการ มหาวิทยาลัยรังสิต"
        ];

        const INITIAL_TOPICS = [
            "การสร้างสรรค์สื่อดิจิทัลเพื่อการศึกษา",
            "ความมั่นคงปลอดภัยทางไซเบอร์สำหรับองค์กร",
            "การประยุกต์ใช้ AI ในการทำงานประจำวัน"
        ];

        const DEFAULT_TEMPLATE = "https://placehold.co/1123x794/e2e8f0/475569?text=Certificate+Background+Template+(A4+Landscape)";

        const INITIAL_CERT_CONFIG = {
            template: DEFAULT_TEMPLATE,
            name: { top: 45, left: 50, size: 36, color: '#1e3a8a' },
            topic: { top: 60, left: 50, size: 24, color: '#374151' },
            date: { top: 75, left: 50, size: 18, color: '#4b5563' }
        };

        const loadSafeData = (key, defaultData) => {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : defaultData;
            } catch (error) {
                console.error("Storage Error", error);
                return defaultData;
            }
        };

        const generateMockData = () => {
            return []; // ลบ Mock data ออกเพื่อให้ Admin เริ่มต้นด้วยข้อมูลว่างๆ
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('assessment');
            const [questions, setQuestions] = useState(() => loadSafeData('sys_questions', INITIAL_QUESTIONS));
            const [topics, setTopics] = useState(() => loadSafeData('sys_topics', INITIAL_TOPICS));
            const [certConfig, setCertConfig] = useState(() => loadSafeData('sys_certConfig', INITIAL_CERT_CONFIG));
            const [submittedData, setSubmittedData] = useState(() => loadSafeData('sys_data', generateMockData()));
            const [isAdmin, setIsAdmin] = useState(() => sessionStorage.getItem('sys_isAdmin') === 'true');

            useEffect(() => { localStorage.setItem('sys_questions', JSON.stringify(questions)); }, [questions]);
            useEffect(() => { localStorage.setItem('sys_topics', JSON.stringify(topics)); }, [topics]);
            useEffect(() => { localStorage.setItem('sys_certConfig', JSON.stringify(certConfig)); }, [certConfig]);
            useEffect(() => { localStorage.setItem('sys_data', JSON.stringify(submittedData)); }, [submittedData]);
            useEffect(() => { sessionStorage.setItem('sys_isAdmin', isAdmin); }, [isAdmin]);

            return (
                <div className="min-h-screen flex flex-col font-sans text-gray-800">
                    <header className="bg-gradient-to-r from-brand-light via-brand to-brand-dark text-white shadow-lg sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-20">
                                <div className="flex items-center gap-3 md:gap-4">
                                    <div className="bg-white text-brand-dark px-3 py-2 md:px-4 md:py-2 rounded shadow-sm font-bold text-sm md:text-lg flex items-center gap-2 whitespace-nowrap">
                                        <i className="fas fa-graduation-cap text-brand"></i> ศูนย์บริการทางวิชาการ
                                    </div>
                                    <h1 className="text-lg md:text-2xl font-bold hidden lg:block tracking-wide drop-shadow-md">
                                        ระบบประเมิน & ประกาศนียบัตร
                                    </h1>
                                </div>
                                <nav className="flex space-x-1 md:space-x-4 overflow-x-auto">
                                    <button onClick={() => setActiveTab('assessment')} className={`px-3 py-2 rounded-lg text-sm md:text-base font-medium transition-all duration-300 flex items-center gap-2 whitespace-nowrap ${activeTab === 'assessment' ? 'bg-white text-brand shadow-md' : 'hover:bg-white/20'}`}>
                                        <i className="fas fa-clipboard-list"></i> <span className="hidden md:inline">ประเมินความพึงพอใจ</span>
                                    </button>
                                    <button onClick={() => setActiveTab('search')} className={`px-3 py-2 rounded-lg text-sm md:text-base font-medium transition-all duration-300 flex items-center gap-2 whitespace-nowrap ${activeTab === 'search' ? 'bg-white text-brand shadow-md' : 'hover:bg-white/20'}`}>
                                        <i className="fas fa-search"></i> <span className="hidden md:inline">ค้นหาใบประกาศฯ</span>
                                    </button>
                                    <button onClick={() => setActiveTab('admin')} className={`px-3 py-2 rounded-lg text-sm md:text-base font-medium transition-all duration-300 flex items-center gap-2 whitespace-nowrap ${activeTab === 'admin' ? 'bg-white text-brand shadow-md' : 'hover:bg-white/20'}`}>
                                        <i className="fas fa-cog"></i> <span className="hidden md:inline">Site Admin</span>
                                    </button>
                                </nav>
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {activeTab === 'assessment' && <AssessmentFlow questions={questions} topics={topics} certConfig={certConfig} onComplete={(data) => setSubmittedData([...submittedData, data])} />}
                        {activeTab === 'search' && <SearchCertificates data={submittedData} />}
                        {activeTab === 'admin' && <AdminArea isAdmin={isAdmin} setIsAdmin={setIsAdmin} questions={questions} setQuestions={setQuestions} topics={topics} setTopics={setTopics} certConfig={certConfig} setCertConfig={setCertConfig} data={submittedData} />}
                    </main>

                    <footer className="bg-gray-800 text-gray-300 py-6 text-center text-sm mt-auto">
                        <p>&copy; {new Date().getFullYear()} ศูนย์บริการทางวิชาการ มหาวิทยาลัยรังสิต. All rights reserved.</p>
                    </footer>
                </div>
            );
        };

        const AssessmentFlow = ({ questions, topics, certConfig, onComplete }) => {
            const [step, setStep] = useState('survey');
            const [scores, setScores] = useState({});
            const [comment, setComment] = useState(''); // State ความคิดเห็นเพิ่มเติม
            const [certData, setCertData] = useState({ name: '', email: '', topic: topics[0] || '' });
            const [isGenerating, setIsGenerating] = useState(false);
            const certRef = useRef(null);

            const handleSurveySubmit = (e) => {
                e.preventDefault();
                if (Object.keys(scores).length < questions.length) {
                    alert('กรุณาตอบแบบประเมินให้ครบทุกข้อ');
                    return;
                }
                setStep('request_cert');
            };

            const handleCertSubmit = async (e) => {
                e.preventDefault();
                setIsGenerating(true);
                try {
                    // สร้าง Array คะแนนให้เรียงตามคำถาม
                    const scoreArray = questions.map((_, idx) => scores[idx] || 0);
                    const formattedDate = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });

                    let pdfBase64 = '';
                    if (certRef.current) {
                        const canvas = await html2canvas(certRef.current, { scale: 2, useCORS: true });
                        const imgData = canvas.toDataURL('image/jpeg', 1.0);
                        const { jsPDF } = window.jspdf;
                        const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                        pdf.addImage(imgData, 'JPEG', 0, 0, 297, 210);
                        pdf.save(`Certificate_${certData.name.replace(/\s+/g, '_')}.pdf`);
                        pdfBase64 = pdf.output('datauristring');
                    }

                    let driveUrl = '';
                    // =========================================================
                    // URL ของ Google Apps Script ที่สามารถส่งเข้า Drive + Email ได้
                    // =========================================================
                    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuUtWxW8a-hlLKTODKdgLjQoJMusPR8dHDjPaTCIoI8PE7mTC4fDMhEAL11GTGnSiSDg/exec"; 
                    
                    if (GOOGLE_SCRIPT_URL) {
                        const response = await fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify({ 
                                email: certData.email, 
                                name: certData.name, 
                                topic: certData.topic,
                                date: formattedDate,
                                scores: scoreArray,
                                comment: comment, // แนบส่งความคิดเห็นเพิ่มเติมไปด้วย
                                pdfBase64: pdfBase64 
                            })
                        });

                        try {
                            const result = await response.json();
                            if (result && result.fileUrl) {
                                driveUrl = result.fileUrl; // รับลิงก์ที่ถูกสร้างใหม่จาก Google Drive
                            }
                        } catch (jsonErr) {
                            console.error("Error parsing script response:", jsonErr);
                        }
                    }

                    const newData = {
                        id: 'CERT-' + Date.now(),
                        name: certData.name,
                        email: certData.email,
                        topic: certData.topic,
                        date: formattedDate,
                        scores: scoreArray,
                        comment: comment, // เก็บข้อมูลความคิดเห็นเพิ่มเติมลงในแบบบันทึก
                        driveUrl: driveUrl // จัดเก็บลิงก์ Google Drive ลงประวัติในเครื่อง
                    };
                    onComplete(newData);
                    setStep('success');
                } catch (error) {
                    console.error("Error generating PDF:", error);
                    alert("เกิดข้อผิดพลาดในการสร้างใบประกาศนียบัตร");
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="max-w-4xl mx-auto">
                    {/* Hidden Cert */}
                    <div style={{ position: 'absolute', top: '-9999px', left: '-9999px' }}>
                        <div ref={certRef} style={{ width: '1123px', height: '794px', backgroundImage: `url(${certConfig.template})`, backgroundSize: '1123px 794px', backgroundRepeat: 'no-repeat', position: 'relative', fontFamily: "'Sarabun', sans-serif", backgroundColor: '#fff' }}>
                            <div style={{ position: 'absolute', top: `${certConfig.name.top}%`, left: `${certConfig.name.left}%`, transform: 'translate(-50%, -50%)', fontSize: `${certConfig.name.size}px`, color: certConfig.name.color, fontWeight: 'bold', whiteSpace: 'nowrap', width: '100%', textAlign: 'center' }}>
                                {certData.name || 'ชื่อ นามสกุล'}
                            </div>
                            <div style={{ position: 'absolute', top: `${certConfig.topic.top}%`, left: `${certConfig.topic.left}%`, transform: 'translate(-50%, -50%)', fontSize: `${certConfig.topic.size}px`, color: certConfig.topic.color, whiteSpace: 'nowrap', width: '100%', textAlign: 'center' }}>
                                {certData.topic || 'หัวข้อการฝึกอบรม'}
                            </div>
                            <div style={{ position: 'absolute', top: `${certConfig.date.top}%`, left: `${certConfig.date.left}%`, transform: 'translate(-50%, -50%)', fontSize: `${certConfig.date.size}px`, color: certConfig.date.color, whiteSpace: 'nowrap', width: '100%', textAlign: 'center' }}>
                                ให้ไว้ ณ วันที่ {new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })}
                            </div>
                        </div>
                    </div>

                    {step === 'survey' && (
                        <div className="bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-100">
                            <div className="bg-brand text-white p-6 text-center">
                                <h2 className="text-2xl md:text-3xl font-bold mb-2">แบบประเมินความพึงพอใจในการฝึกอบรม</h2>
                                <p className="text-blue-100 text-sm md:text-lg">ความคิดเห็นของท่านจะเป็นประโยชน์อย่างยิ่งในการพัฒนาการจัดอบรมในครั้งต่อไป</p>
                            </div>
                            <form onSubmit={handleSurveySubmit} className="p-4 md:p-10">
                                
                                <div className="hidden md:flex justify-end mb-4 pr-2">
                                    <div className="flex w-72 justify-between text-sm font-semibold text-gray-500">
                                        <span>น้อยสุด (1)</span>
                                        <span>มากสุด (5)</span>
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    {questions.map((q, idx) => (
                                        <div key={idx} className="flex flex-col md:flex-row md:items-center justify-between border-b border-gray-100 py-5 hover:bg-gray-50 transition px-2 rounded-lg">
                                            <p className="text-base md:text-lg text-gray-800 mb-6 md:mb-0 flex-1 pr-4">
                                                {idx + 1}. {q}
                                            </p>
                                            
                                            <div className="flex md:hidden justify-between text-xs text-gray-500 font-bold mb-2 px-1">
                                                <span>น้อยสุด (1)</span>
                                                <span>มากสุด (5)</span>
                                            </div>

                                            <div className="flex w-full md:w-72 justify-between items-center px-1">
                                                {[1, 2, 3, 4, 5].map(val => (
                                                    <label key={val} className="flex flex-col items-center cursor-pointer group">
                                                        <span className={`text-lg md:text-xl mb-3 font-medium transition-colors ${scores[idx] === val ? 'text-brand font-bold' : 'text-gray-700 group-hover:text-brand'}`}>
                                                            {val}
                                                        </span>
                                                        <input 
                                                            type="radio" 
                                                            name={`q_${idx}`} 
                                                            value={val}
                                                            required
                                                            className="cursor-pointer"
                                                            onChange={() => setScores({...scores, [idx]: val})}
                                                        />
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* กล่องข้อความแสดงความคิดเห็นเพิ่มเติม */}
                                <div className="mt-8 border-t pt-8 border-gray-100">
                                    <label className="block text-gray-800 font-bold mb-3 text-lg">
                                        <i className="fas fa-comment-dots text-brand mr-2"></i> ข้อเสนอแนะ / ความคิดเห็นเพิ่มเติม
                                    </label>
                                    <textarea 
                                        className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand focus:border-transparent outline-none transition" 
                                        rows="4" 
                                        placeholder="พิมพ์ข้อเสนอแนะหรือความคิดเห็นของท่านที่นี่..."
                                        value={comment}
                                        onChange={e => setComment(e.target.value)}
                                    ></textarea>
                                </div>

                                <div className="mt-10 text-center">
                                    <button type="submit" className="bg-brand hover:bg-brand-dark text-white font-bold py-4 px-12 rounded-full shadow-lg transform transition hover:scale-105 text-xl flex items-center justify-center mx-auto gap-3">
                                        ส่งแบบประเมิน <i className="fas fa-paper-plane"></i>
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {step === 'request_cert' && (
                        <div className="bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-100 max-w-2xl mx-auto">
                            <div className="bg-gradient-to-r from-blue-500 to-indigo-600 text-white p-6 text-center">
                                <h2 className="text-2xl font-bold mb-2">ขอบคุณสำหรับการประเมิน</h2>
                                <p className="text-blue-100">กรุณากรอกข้อมูลเพื่อรับใบประกาศนียบัตร</p>
                            </div>
                            <form onSubmit={handleCertSubmit} className="p-8 space-y-6">
                                <div>
                                    <label className="block text-gray-700 font-semibold mb-2">ชื่อ - นามสกุล (สำหรับพิมพ์ลงใบประกาศฯ)</label>
                                    <input type="text" required className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand focus:border-transparent" value={certData.name} onChange={e => setCertData({...certData, name: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-semibold mb-2">อีเมล (เพื่อจัดส่งสำเนา)</label>
                                    <input type="email" required className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand focus:border-transparent" value={certData.email} onChange={e => setCertData({...certData, email: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-semibold mb-2">หัวข้อที่ท่านได้เข้ารับการฝึกอบรม</label>
                                    <select required className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand focus:border-transparent bg-white" value={certData.topic} onChange={e => setCertData({...certData, topic: e.target.value})}>
                                        <option value="" disabled>-- เลือกหัวข้อการอบรม --</option>
                                        {topics.map((t, i) => <option key={i} value={t}>{t}</option>)}
                                    </select>
                                </div>
                                <div className="mt-8">
                                    <button type="submit" disabled={isGenerating} className={`w-full py-4 rounded-xl font-bold text-lg text-white shadow-lg transition-all flex justify-center items-center gap-2 ${isGenerating ? 'bg-gray-400 cursor-not-allowed' : 'bg-brand hover:bg-brand-dark hover:shadow-blue-500/50'}`}>
                                        {isGenerating ? <span><i className="fas fa-spinner fa-spin"></i> กำลังสร้างใบประกาศ...</span> : <span><i className="fas fa-award text-2xl"></i> กดรับใบประกาศนียบัตร</span>}
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {step === 'success' && (
                        <div className="bg-white shadow-xl rounded-2xl p-10 text-center max-w-lg mx-auto border-t-4 border-green-500">
                            <i className="fas fa-check-circle text-6xl text-green-500 mb-6"></i>
                            <h2 className="text-3xl font-bold text-gray-800 mb-4">ดำเนินการสำเร็จ!</h2>
                            <p className="text-gray-600 mb-8">ใบประกาศฯ ถูกดาวน์โหลดลงเครื่อง และระบบได้จัดส่งอีเมลพร้อมจัดเก็บสำเนาไว้บน Google Drive เรียบร้อยแล้ว</p>
                            <button onClick={() => {setStep('survey'); setScores({}); setComment(''); setCertData({ name: '', email: '', topic: topics[0] || '' });}} className="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-6 rounded-lg transition">กลับไปหน้าแรก</button>
                        </div>
                    )}
                </div>
            );
        };

        const SearchCertificates = ({ data }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [results, setResults] = useState([]);
            const [hasSearched, setHasSearched] = useState(false);

            const handleSearch = (e) => {
                e.preventDefault();
                if(!searchTerm.trim()) return;
                const lowerTerm = searchTerm.toLowerCase();
                setResults(data.filter(item => item.name.toLowerCase().includes(lowerTerm)));
                setHasSearched(true);
            };

            return (
                <div className="max-w-4xl mx-auto">
                    <div className="bg-white shadow-xl rounded-2xl p-8 border border-gray-100">
                        <h2 className="text-3xl font-bold text-center text-gray-800 mb-2">ค้นหาใบประกาศนียบัตร</h2>
                        <form onSubmit={handleSearch} className="flex gap-4 max-w-2xl mx-auto mb-10 mt-8">
                            <input type="text" className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-brand text-lg outline-none" placeholder="พิมพ์ ชื่อ หรือ นามสกุล..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            <button type="submit" className="bg-brand hover:bg-brand-dark text-white px-8 py-3 rounded-xl font-bold shadow-md transition">ค้นหา</button>
                        </form>
                        {hasSearched && (
                            <div>
                                <h3 className="text-lg font-semibold border-b pb-2 mb-4">ผลการค้นหา ({results.length})</h3>
                                <div className="grid gap-4 md:grid-cols-2">
                                    {results.length > 0 ? results.map((item, idx) => (
                                        <div key={idx} className="bg-gray-50 p-5 rounded-xl border border-gray-200 flex flex-col justify-between min-h-[180px]">
                                            <div>
                                                <h4 className="font-bold text-brand-dark text-lg">{item.name}</h4>
                                                <p className="text-sm text-gray-500 mb-2">{item.email}</p>
                                                <p className="text-sm mt-2"><span className="font-semibold">หลักสูตร:</span> {item.topic}</p>
                                                <p className="text-sm text-gray-500"><i className="far fa-calendar-alt"></i> {item.date}</p>
                                            </div>
                                            
                                            {/* เพิ่มส่วนการแสดงลิงก์ดาวน์โหลดจาก Google Drive หากข้อมูลมี driveUrl อยู่ */}
                                            {item.driveUrl && (
                                                <div className="mt-4 pt-3 border-t border-gray-200">
                                                    <a 
                                                        href={item.driveUrl} 
                                                        target="_blank" 
                                                        rel="noopener noreferrer" 
                                                        className="inline-flex items-center gap-2 text-brand hover:text-brand-dark font-semibold text-sm bg-blue-50 px-4 py-2.5 rounded-lg hover:bg-blue-100 transition-all w-full justify-center border border-blue-200 shadow-sm"
                                                    >
                                                        <i className="fab fa-google-drive text-lg text-green-600"></i>
                                                        คลิกเพื่อดูใบประกาศฯ บน Google Drive
                                                    </a>
                                                </div>
                                            )}
                                        </div>
                                    )) : <p className="text-gray-500">ไม่พบข้อมูลใบประกาศนียบัตร</p>}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const AdminArea = (props) => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const handleLogin = (e) => {
                e.preventDefault();
                if (username === 'admin' && password === 'cyberu236') props.setIsAdmin(true);
                else alert('Username หรือ Password ไม่ถูกต้อง');
            };
            if (!props.isAdmin) {
                return (
                    <div className="max-w-md mx-auto mt-10 bg-white shadow-2xl rounded-2xl overflow-hidden">
                        <div className="bg-gray-800 text-white p-6 text-center"><h2 className="text-2xl font-bold">Admin Login</h2></div>
                        <form onSubmit={handleLogin} className="p-8 space-y-5">
                            <input type="text" required placeholder="Username" className="w-full px-4 py-3 border rounded-lg outline-none focus:ring-2 focus:ring-brand" value={username} onChange={e => setUsername(e.target.value)} />
                            <input type="password" required placeholder="Password" className="w-full px-4 py-3 border rounded-lg outline-none focus:ring-2 focus:ring-brand" value={password} onChange={e => setPassword(e.target.value)} />
                            <button type="submit" className="w-full bg-gray-800 text-white font-bold py-3 rounded-lg hover:bg-gray-700 transition">เข้าสู่ระบบ</button>
                        </form>
                    </div>
                );
            }
            return <AdminDashboard {...props} onLogout={() => {props.setIsAdmin(false); setUsername(''); setPassword('');}} />;
        };

        const AdminDashboard = ({ questions, setQuestions, topics, setTopics, certConfig, setCertConfig, data, onLogout }) => {
            const chartRef = useRef(null);
            const doughnutRef = useRef(null);
            const chartInstance = useRef(null);
            const doughnutInstance = useRef(null);
            const [activeMenu, setActiveMenu] = useState('dashboard');

            const chartData = useMemo(() => {
                if (!data || data.length === 0) return null;
                const averages = questions.map((_, qIdx) => {
                    const sum = data.reduce((acc, curr) => acc + (curr.scores[qIdx] || 0), 0);
                    return (sum / data.length).toFixed(2);
                });
                return { labels: questions.map((_, i) => `ข้อ ${i+1}`), datasets: [{ label: 'คะแนนเฉลี่ย', data: averages, backgroundColor: '#3b82f6', borderRadius: 4 }] };
            }, [data, questions]);

            const doughnutData = useMemo(() => {
                if (!data || data.length === 0) return null;
                const counts = { 5: 0, 4: 0, 3: 0, 2: 0, 1: 0 };
                data.forEach(item => {
                    const avg = item.scores.reduce((a, b) => a + b, 0) / (item.scores.length || 1);
                    if (avg >= 4.5) counts[5]++;
                    else if (avg >= 3.5) counts[4]++;
                    else if (avg >= 2.5) counts[3]++;
                    else if (avg >= 1.5) counts[2]++;
                    else counts[1]++;
                });
                return {
                    labels: ['ดีมาก (5)', 'ดี (4)', 'ปานกลาง (3)', 'น้อย (2)', 'ปรับปรุง (1)'],
                    datasets: [{
                        data: [counts[5], counts[4], counts[3], counts[2], counts[1]],
                        backgroundColor: ['#22c55e', '#3b82f6', '#eab308', '#f97316', '#ef4444'],
                        borderWidth: 2,
                        hoverOffset: 4
                    }]
                };
            }, [data]);

            const overallAverage = useMemo(() => {
                if (!data || data.length === 0) return 0;
                const totalScore = data.reduce((acc, curr) => acc + curr.scores.reduce((a,b)=>a+b,0), 0);
                const totalQuestions = data.length * questions.length;
                return (totalScore / totalQuestions).toFixed(2);
            }, [data, questions]);

            useEffect(() => {
                if (activeMenu === 'dashboard') {
                    if (chartRef.current && chartData) {
                        if (chartInstance.current) chartInstance.current.destroy();
                        chartInstance.current = new Chart(chartRef.current, { type: 'bar', data: chartData, options: { responsive: true, maintainAspectRatio: false, scales: { y: { max: 5, beginAtZero: true } } } });
                    }
                    if (doughnutRef.current && doughnutData) {
                        if (doughnutInstance.current) doughnutInstance.current.destroy();
                        doughnutInstance.current = new Chart(doughnutRef.current, { type: 'doughnut', data: doughnutData, options: { responsive: true, maintainAspectRatio: false, plugins: { textCenter: {}, legend: { position: 'bottom' } }, cutout: '65%' } });
                    }
                }
            }, [activeMenu, chartData, doughnutData]);

            const handleExport = () => {
                const wsData = [['ID', 'ชื่อ', 'อีเมล', 'หัวข้อ', 'วันที่', ...questions.map((_, i) => `ข้อ ${i+1}`), 'ความคิดเห็น', 'ลิงก์ Google Drive']];
                data.forEach(item => wsData.push([item.id, item.name, item.email, item.topic, item.date, ...item.scores, item.comment || '-', item.driveUrl || '-']));
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Results");
                XLSX.writeFile(wb, "Report_Export.xlsx");
            };

            return (
                <div className="flex flex-col md:flex-row gap-6">
                    <div className="w-full md:w-64 bg-white shadow-lg rounded-xl overflow-hidden border border-gray-100 flex-shrink-0 h-fit">
                        <div className="bg-gray-800 text-white p-4 font-bold flex items-center gap-2"><i className="fas fa-tools"></i> Admin Panel</div>
                        <div className="p-2 flex flex-col space-y-1">
                            <button onClick={() => setActiveMenu('dashboard')} className={`p-3 text-left rounded-lg transition ${activeMenu === 'dashboard' ? 'bg-blue-50 text-brand font-bold' : 'hover:bg-gray-50'}`}><i className="fas fa-chart-pie w-6"></i> Dashboard</button>
                            <button onClick={() => setActiveMenu('settings')} className={`p-3 text-left rounded-lg transition ${activeMenu === 'settings' ? 'bg-blue-50 text-brand font-bold' : 'hover:bg-gray-50'}`}><i className="fas fa-list w-6"></i> ตั้งค่าหัวข้อ</button>
                            <button onClick={() => setActiveMenu('template')} className={`p-3 text-left rounded-lg transition ${activeMenu === 'template' ? 'bg-blue-50 text-brand font-bold' : 'hover:bg-gray-50'}`}><i className="fas fa-certificate w-6"></i> รูปแบบใบประกาศฯ</button>
                            <div className="my-2 border-t border-gray-100"></div>
                            <button onClick={onLogout} className="p-3 text-left text-red-600 hover:bg-red-50 rounded-lg transition font-medium"><i className="fas fa-sign-out-alt w-6"></i> ออกจากระบบ</button>
                        </div>
                    </div>
                    <div className="flex-grow">
                        {activeMenu === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="bg-white shadow-lg rounded-xl p-6 flex flex-col sm:flex-row justify-between items-center gap-4 border-l-4 border-brand">
                                    <h2 className="text-2xl font-bold text-gray-800">Dashboard สรุปผล</h2>
                                    <button onClick={handleExport} className="bg-green-600 hover:bg-green-700 transition text-white px-5 py-2.5 rounded-lg shadow-md font-bold flex items-center gap-2">
                                        <i className="fas fa-file-excel"></i> Export Excel
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white shadow-lg rounded-xl p-6 flex items-center gap-5 border border-gray-100">
                                        <div className="p-4 bg-blue-100 rounded-full text-brand text-3xl w-16 h-16 flex items-center justify-center"><i className="fas fa-users"></i></div>
                                        <div>
                                            <p className="text-sm text-gray-500 font-bold mb-1">จำนวนผู้ประเมินทั้งหมด</p>
                                            <p className="text-3xl font-bold text-gray-800">{data.length} <span className="text-lg font-normal text-gray-500">คน</span></p>
                                        </div>
                                    </div>
                                    <div className="bg-white shadow-lg rounded-xl p-6 flex items-center gap-5 border border-gray-100">
                                        <div className="p-4 bg-yellow-100 rounded-full text-yellow-500 text-3xl w-16 h-16 flex items-center justify-center"><i className="fas fa-star"></i></div>
                                        <div>
                                            <p className="text-sm text-gray-500 font-bold mb-1">คะแนนความพึงพอใจเฉลี่ย</p>
                                            <p className="text-3xl font-bold text-gray-800">{overallAverage} <span className="text-lg font-normal text-gray-500">/ 5</span></p>
                                        </div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-white shadow-lg rounded-xl p-6 border border-gray-100">
                                        <h3 className="text-lg font-bold text-gray-700 mb-4 text-center">คะแนนเฉลี่ยแต่ละข้อ</h3>
                                        <div className="h-72 w-full relative">
                                            {data.length > 0 ? <canvas ref={chartRef}></canvas> : <div className="absolute inset-0 flex items-center justify-center text-gray-400">ไม่มีข้อมูล</div>}
                                        </div>
                                    </div>
                                    <div className="bg-white shadow-lg rounded-xl p-6 border border-gray-100">
                                        <h3 className="text-lg font-bold text-gray-700 mb-4 text-center">สัดส่วนระดับความพึงพอใจ</h3>
                                        <div className="h-72 w-full relative flex justify-center">
                                            {data.length > 0 ? <canvas ref={doughnutRef}></canvas> : <div className="absolute inset-0 flex items-center justify-center text-gray-400">ไม่มีข้อมูล</div>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        {activeMenu === 'settings' && (
                            <div className="space-y-6">
                                <AdminListEditor title="คำถามประเมินความพึงพอใจ" items={questions} setItems={setQuestions} />
                                <AdminListEditor title="หลักสูตรอบรม" items={topics} setItems={setTopics} />
                            </div>
                        )}
                        {activeMenu === 'template' && <TemplateEditor certConfig={certConfig} setCertConfig={setCertConfig} />}
                    </div>
                </div>
            );
        };

        const AdminListEditor = ({ title, items, setItems }) => {
            const [newItem, setNewItem] = useState('');
            const add = (e) => { e.preventDefault(); if(newItem.trim()) { setItems([...items, newItem.trim()]); setNewItem(''); } };
            const remove = (idx) => { if(confirm('ต้องการลบหัวข้อนี้ใช่หรือไม่?')) setItems(items.filter((_, i) => i !== idx)); };
            return (
                <div className="bg-white shadow-lg rounded-xl p-6 border-t-4 border-brand">
                    <h3 className="font-bold text-xl mb-4">{title}</h3>
                    <ul className="space-y-2 mb-4">
                        {items.map((it, i) => (
                            <li key={i} className="flex justify-between items-center bg-gray-50 border p-3 rounded hover:bg-gray-100 transition">
                                <span>{i+1}. {it}</span>
                                <button onClick={() => remove(i)} className="text-red-500 hover:text-red-700 p-2"><i className="fas fa-trash"></i></button>
                            </li>
                        ))}
                    </ul>
                    <form onSubmit={add} className="flex gap-2 mt-4">
                        <input type="text" required className="flex-grow border px-4 py-2 rounded focus:ring-2 focus:ring-brand focus:border-transparent outline-none" value={newItem} onChange={e=>setNewItem(e.target.value)} placeholder="พิมพ์หัวข้อที่ต้องการเพิ่ม..." />
                        <button className="bg-brand hover:bg-brand-dark text-white font-bold px-6 py-2 rounded shadow transition">เพิ่มหัวข้อ</button>
                    </form>
                </div>
            );
        }

        const TemplateEditor = ({ certConfig, setCertConfig }) => {
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => setCertConfig({...certConfig, template: event.target.result});
                    reader.readAsDataURL(file);
                }
            };
            const update = (key, field, val) => setCertConfig({...certConfig, [key]: {...certConfig[key], [field]: field==='color'?val:Number(val)}});
            
            return (
                <div className="bg-white shadow-lg rounded-xl p-6">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <h2 className="font-bold text-xl">ตั้งค่าใบประกาศนียบัตร</h2>
                        <label className="bg-indigo-600 hover:bg-indigo-700 transition text-white px-4 py-2 rounded shadow cursor-pointer font-bold">
                            <i className="fas fa-upload mr-2"></i> อัปโหลด Template ใหม่ 
                            <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                        </label>
                    </div>
                    <div className="grid xl:grid-cols-3 gap-6">
                        <div className="space-y-4">
                            {['name', 'topic', 'date'].map(key => (
                                <div key={key} className="border p-4 rounded-lg bg-gray-50 shadow-sm">
                                    <h4 className="font-bold mb-3 text-brand-dark">{key === 'name' ? '1. ตำแหน่ง ชื่อ-นามสกุล' : key === 'topic' ? '2. ตำแหน่ง หลักสูตร' : '3. ตำแหน่ง วันที่'}</h4>
                                    <label className="block text-xs font-semibold mb-1 text-gray-600">เลื่อนขึ้น/ลง ({certConfig[key].top}%)</label>
                                    <input type="range" min="0" max="100" value={certConfig[key].top} onChange={e=>update(key, 'top', e.target.value)} className="w-full mb-3"/>
                                    <label className="block text-xs font-semibold mb-1 text-gray-600">เลื่อนซ้าย/ขวา ({certConfig[key].left}%)</label>
                                    <input type="range" min="0" max="100" value={certConfig[key].left} onChange={e=>update(key, 'left', e.target.value)} className="w-full mb-3"/>
                                    <div className="flex gap-4">
                                        <div className="w-1/2">
                                            <label className="text-xs font-semibold text-gray-600 block mb-1">ขนาดตัวอักษร</label>
                                            <input type="number" value={certConfig[key].size} onChange={e=>update(key,'size',e.target.value)} className="w-full border p-1 rounded outline-none"/>
                                        </div>
                                        <div className="w-1/2">
                                            <label className="text-xs font-semibold text-gray-600 block mb-1">สีตัวอักษร</label>
                                            <input type="color" value={certConfig[key].color} onChange={e=>update(key,'color',e.target.value)} className="w-full h-8 rounded cursor-pointer border-0"/>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="xl:col-span-2 bg-gray-200 rounded-lg p-4 flex items-center justify-center min-h-[400px]">
                            {/* Preview Area */}
                            <div className="relative w-full max-w-[800px] aspect-[1.414] bg-white shadow-xl overflow-hidden" style={{backgroundImage: `url(${certConfig.template})`, backgroundSize: '100% 100%'}}>
                                <div style={{position: 'absolute', top: `${certConfig.name.top}%`, left: `${certConfig.name.left}%`, transform: 'translate(-50%, -50%)', color: certConfig.name.color, fontSize: `clamp(12px, ${certConfig.name.size / 1.5}px, ${certConfig.name.size}px)`, fontWeight: 'bold', whiteSpace: 'nowrap'}}>
                                    นาย สมชาย ใจดี
                                </div>
                                <div style={{position: 'absolute', top: `${certConfig.topic.top}%`, left: `${certConfig.topic.left}%`, transform: 'translate(-50%, -50%)', color: certConfig.topic.color, fontSize: `clamp(10px, ${certConfig.topic.size / 1.5}px, ${certConfig.topic.size}px)`, whiteSpace: 'nowrap'}}>
                                    การสร้างสรรค์สื่อดิจิทัลเพื่อการศึกษา
                                </div>
                                <div style={{position: 'absolute', top: `${certConfig.date.top}%`, left: `${certConfig.date.left}%`, transform: 'translate(-50%, -50%)', color: certConfig.date.color, fontSize: `clamp(8px, ${certConfig.date.size / 1.5}px, ${certConfig.date.size}px)`, whiteSpace: 'nowrap'}}>
                                    ให้ไว้ ณ วันที่ {new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        }
    </script>
</body>
</html>
